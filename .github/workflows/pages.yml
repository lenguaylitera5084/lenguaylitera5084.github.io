name: GitHub Pages CI
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AF5C4A: ${{ secrets.AF5C4A }}
          B52780: ${{ secrets.B52780 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AF5C4A', '')
          tag_b = os.environ.get('B52780', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- 3a063137b40346a67cd4 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 00422b93d11154f8285f0c -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deploy
        uses: actions/deploy-pages@v4
